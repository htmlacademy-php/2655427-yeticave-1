name: yeticave-vika

services:
    php:
        build:
            context: php
            dockerfile: Dockerfile
            args:
                PHP_VERSION: '8.5'
                FPM_PORT: 9000
                DIR: /app
        container_name: yeticave-vika-php
        hostname: localhost
        restart: unless-stopped
        volumes:
            - ../../:/app
            - ./php/php.ini:/usr/local/etc/php/php.ini:ro
        working_dir: /

    nginx:
        image: nginx:1.21
        container_name: yeticave-vika-nginx
        environment:
            LISTEN_HTTP: 80
            PHP_FPM_HOST: php
            PHP_FPM_PORT: 9000
        ports:
            - '8980:80'
        restart: unless-stopped
        volumes:
            - ../../:/app
            - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
        working_dir: /

    mysql:
        image: mysql
        container_name: yeticave-vika-mysql
        environment:
            MYSQL_ROOT_PASSWORD: 1234
        ports:
            - '8906:3306'
        restart: no
        volumes:
            - mysql_data:/var/lib/mysql
            - ./mysql/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
            - ./mysql/02-category.sql:/docker-entrypoint-initdb.d/02-category.sql:ro

volumes:
    mysql_data:
        driver: local
